# ==============================================================
#  ML Platform — Full Docker Compose
#  Layers: Streaming | Training Pipeline | Serving
# ==============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: custom-airflow:2.9.1
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    MLFLOW_TRACKING_URI: http://mlflow:5000
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./training-pipeline/src:/opt/airflow/src
    - ./logs/airflow:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./training-pipeline/configs:/opt/airflow/configs
    - ./training-pipeline/data:/opt/airflow/data
  networks: [ml-net]
  depends_on:
    - postgres

networks:
  ml-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  minio-data:
  mlflow-data:
  grafana-data:
  metabase-data:
  spark-data:

services:

  # ============================================================
  # LAYER 1: STREAMING
  # ============================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    networks: [ml-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc zookeeper 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    networks: [ml-net]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 15s
      timeout: 10s
      retries: 5

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    networks: [ml-net]
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - spark-data:/opt/spark/data
      - ./spark-jobs:/opt/spark-jobs

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    networks: [ml-net]
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - spark-data:/opt/spark/data
      - ./spark-jobs:/opt/spark/jobs

  streaming-service:
    build:
      context: ./streaming-service
      dockerfile: Dockerfile
    container_name: streaming-service
    networks: [ml-net]
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB}
      SPARK_MASTER: spark://spark-master:7077
      ML_SERVICE_URL: http://ml-service:8000/predict-batch
    depends_on:
      - kafka
      - mongo
      - ml-service
    restart: on-failure

  mongo:
    image: mongo:7.0
    container_name: mongo
    networks: [ml-net]
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # LAYER 2: TRAINING PIPELINE
  # ============================================================

  postgres:
    image: postgres:16
    container_name: postgres
    networks: [ml-net]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    networks: [ml-net]
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks: [ml-net]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/mlflow-artifacts;
        mc mb --ignore-existing local/models;
        echo 'MinIO buckets ready';
      "

  mlflow:
    build: ./training-pipeline
    container_name: mlflow
    networks: [ml-net]
    command: >
      mlflow server
        --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${MLFLOW_DB}
        --default-artifact-root s3://mlflow-artifacts/
        --host 0.0.0.0
        --port 5000
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - minio

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    networks: [ml-net]
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for postgres to be ready..."
        until pg_isready -h postgres -U "${POSTGRES_USER}"; do
          sleep 2
        done
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      - airflow-init
    healthcheck:
      test: ["CMD", "curl", "-f", "http://airflow-webserver:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      - airflow-init

  training-pipeline:
    build:
      context: ./training-pipeline
      dockerfile: Dockerfile
    container_name: training-pipeline
    networks: [ml-net]
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      SAMPLE_SIZE: ${SAMPLE_SIZE:-5000}
    volumes:
      - ./training-pipeline/data:/app/data
      - ./training-pipeline/src:/app/src
      - ./training-pipeline/configs:/app/configs
      - ./training-pipeline/models:/app/models
    depends_on:
      - mlflow
      - minio
      - postgres
    command: python /app/src/pipeline.py

  # ============================================================
  # LAYER 3: SERVING
  # ============================================================

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: ml-service
    networks: [ml-net]
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MONGO_URI: mongodb://mongo:27017/${MONGO_DB}
      MODEL_NAME: ${MODEL_NAME}
      MODEL_STAGE: ${MODEL_STAGE}
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
      - minio
      - mongo
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ml-service:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    networks: [ml-net]
    volumes:
      - metabase-data:/metabase-data
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    networks: [ml-net]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: http://grafana:3001
    ports:
      - "3001:3000"
    depends_on:
      - postgres